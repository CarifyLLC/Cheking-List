<!DOCTYPE html>
<html lang="az">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- İkon. Dəyişdirsən, sonuna ?v=2 əlavə et — iOS köhnə ikonu keşdə saxlayır. -->

  <meta name="apple-mobile-web-app-title" content="Checking">
  <meta name="theme-color" content="#8E1114">

  <style>
    :root {
      --ink: #16181d;
      --paper: #f6f5f3;
      --card: #ffffff;
      --line: #e3e1dd;
      --muted: #6f7278;
      --carify: #8e1114;
      --verify: #c0392b;
      --verify-bg: #fdecea;
      --go: #1a5c1a;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { max-width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .wrap { max-width: 480px; margin: 0 auto; padding: 0 12px 32px; }

    header {
      background: var(--carify);
      padding: 10px 12px;
      margin: 0 -12px 14px;
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 8px;
      overflow: hidden;              /* heç bir element kənara çıxmasın */
    }
    header img {
      height: 18px;                  /* 22px-də loqo ~270px olub dilləri itələyirdi */
      width: auto;
      display: block;
      flex: 0 1 auto;
      min-width: 0;
    }
    header .sub {
      color: #fff;
      opacity: .8;
      font-size: 11px;
      letter-spacing: .03em;
      border-left: 1px solid rgba(255,255,255,.35);
      padding-left: 10px;
      flex: 0 1 auto;
      min-width: 0;
      white-space: nowrap;           /* 2 sətrə sınmasın */
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Dar telefonlarda yazını gizlət — dillərə yer açılsın */
    @media (max-width: 440px) {
      header .sub { display: none; }
    }
    /* Dil seçimi — başlığın sağında, heç vaxt sıxılmır */
    header .langs {
      margin-left: auto;
      display: flex;
      gap: 3px;
      flex: 0 0 auto;
    }
    header .langs button {
      width: auto;
      padding: 5px 7px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      color: #fff;
      background: rgba(255,255,255,.16);
      border-radius: 6px;
    }
    header .langs button.on { background: #fff; color: var(--carify); }

    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 4px;
    }
    input, select {
      width: 100%;
      min-width: 0;
      font: inherit;
      font-size: 16px;               /* iOS-da fokusda zoom etməsin */
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 10px 11px;
      -webkit-appearance: none;
      appearance: none;
    }
    input:focus, select:focus {
      outline: 2px solid var(--carify);
      outline-offset: 1px;
      border-color: transparent;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .02em;
    }

    button {
      width: 100%;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: var(--ink);
      border: 0;
      border-radius: 9px;
      padding: 12px;
      cursor: pointer;
    }
    button:disabled { opacity: .5; }
    button.go { background: var(--go); font-size: 16px; padding: 14px; }
    button.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
      font-weight: 600;
    }

    /* Link sahəsi üstdə, düymələr altdakı sətirdə */
    .search { display: flex; flex-direction: column; gap: 7px; }
    .search input { width: 100%; min-width: 0; }
    .search-btns { display: flex; gap: 7px; align-items: stretch; }
    .search-btns button { flex: 0 0 auto; width: auto; padding: 10px 16px; }
    .search-btns #btnSearch { flex: 1 1 auto; }
    /* Yapışdır düyməsi */
    button.paste {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
      font-weight: 600;
      padding: 10px 14px;
    }
    button.paste:active { background: #eceae7; }
    /* Hamısını təmizlə */
    button.wipe {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
      font-size: 17px;
      font-weight: 600;
      line-height: 1;
      padding: 10px 13px;
    }
    button.wipe:active { background: var(--verify-bg); color: var(--verify); border-color: #f3c9c4; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 13px;
      margin-top: 14px;
    }
    @media (prefers-reduced-motion: no-preference) {
      .card { animation: rise .18s ease-out; }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } }
    }

    .title { font-size: 18px; font-weight: 750; line-height: 1.25; }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      margin-top: 5px;
    }
    .rule { height: 1px; background: var(--line); margin: 12px -13px; }
    .field { margin-bottom: 10px; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* Cədvəldəki qırmızı qayda: ünvan/satıcı scriptdən gəlir — zənglə təsdiqlə */
    .verify input {
      color: var(--verify);
      background: var(--verify-bg);
      border-color: #f3c9c4;
    }
    .verify label { color: var(--verify); }
    .verify-note {
      font-size: 11px;
      color: var(--verify);
      margin: -4px 0 10px;
    }

    .linkline {
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
      margin-top: 2px;
    }
    .msg {
      margin-top: 10px;
      padding: 10px 11px;
      border-radius: 9px;
      font-size: 14px;
      display: none;
    }
    .msg.show { display: block; }
    .msg.ok { background: #e8f5e9; color: #1b5e20; }
    .msg.warn { background: #fff8e1; color: #7a5c00; }
    .msg.err { background: var(--verify-bg); color: #a12; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 7px; }

    /* ===== Şəkillər ===== */
    .phead { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .phead .pacts { margin-left: auto; display: flex; gap: 6px; }
    .phead .pacts button {
      width: auto; padding: 4px 9px; font-size: 11px; font-weight: 600;
      background: transparent; color: var(--muted);
      border: 1px solid var(--line); border-radius: 6px;
    }
    .pgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .pcell {
      position: relative; aspect-ratio: 4 / 3; border-radius: 6px;
      overflow: hidden; background: #eceae7;
      border: 2px solid transparent; cursor: pointer;
    }
    .pcell img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pcell.on { border-color: var(--carify); }
    .pcell.off img { opacity: .3; }
    .pcell .pn {
      position: absolute; right: 3px; bottom: 3px;
      min-width: 17px; height: 17px; padding: 0 4px;
      border-radius: 9px; background: rgba(0,0,0,.6);
      color: #fff; font-size: 10px; font-weight: 700;
      line-height: 17px; text-align: center;
    }
    .wmrow { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; }
    .wmrow input { width: auto; margin: 0; }
  </style>
</head>

  <div class="search">
    <input id="url" type="url" inputmode="url" autocomplete="off"

    <div class="search-btns">
      <button id="btnPaste" class="paste">&#128203; Yapışdır</button>
      <button id="btnSearch">Axtar</button>
      <button id="btnWipe" class="wipe" title="Hamısını təmizlə" aria-label="Hamısını təmizlə">&#10005;</button>
    </div>
  </div>
  <div class="hint" id="hint">Elanın linkini yapışdır — məlumatlar avtomatik gələcək.</div>

  <div id="msgTop" class="msg"></div>

  <div id="card" class="card" style="display:none">
    <div class="title" id="cTitle">—</div>
    <div class="badge" id="cSource">—</div>

    <div class="rule"></div>

    <div class="two">
      <div class="field">
        <label for="fVin" id="lVin">VIN</label>
        <input id="fVin" class="mono">
      </div>
      <div class="field">
        <label for="fPlate" id="lPlate">Nömrə</label>
        <input id="fPlate" class="mono">
      </div>
    </div>

    <div class="two">
      <div class="field">
        <label for="fModel" id="lModel">Brend / Model</label>
        <input id="fModel">
      </div>
      <div class="field">
        <label for="fYear" id="lYear">İl</label>
        <input id="fYear" inputmode="numeric">
      </div>
    </div>

    <div class="field">
      <label for="fPrice" id="lPrice">Qiymət</label>
      <input id="fPrice">
    </div>

    <div class="rule"></div>

    <div class="field">
      <label for="fDealer" id="lDealer">Diller</label>
      <select id="fDealer"><option value="" id="dealerNone">— seçilməyib —</option></select>
    </div>

    <div class="field">
      <label for="fCustomer" id="lCustomer">Müştəri nömrəsi</label>
      <input id="fCustomer" inputmode="tel" class="mono" placeholder="994...">
    </div>

    <div class="rule"></div>

    <div class="field verify">
      <label for="fAddress" id="lAddress">Ünvan</label>
      <input id="fAddress">
    </div>
    <div class="field verify">
      <label for="fSeller" id="lSeller">Satıcı nömrəsi</label>
      <input id="fSeller" class="mono">
    </div>
    <div class="verify-note" id="vNote">Qırmızı sahələr elandan götürülüb — zəngdən sonra dəqiqləşdir.</div>

    <div class="field">
      <label id="lLink">Link</label>
      <div class="linkline mono" id="cLink">—</div>
    </div>

    <div class="rule"></div>

    <div id="photos" style="display:none">
      <div class="phead">
        <label id="lPhotos">Şəkillər</label>
        <div class="pacts">
          <button type="button" id="pAll">Hamısı</button>
          <button type="button" id="pNone">Heç biri</button>
        </div>
      </div>
      <div class="pgrid" id="pGrid"></div>
      <label class="wmrow">
        <input type="checkbox" id="pWm" checked>
        <span id="lWm">Loqo vur</span>
      </label>
      <button id="btnPhotos" class="ghost" style="margin-top:10px">Şəkilləri hazırla</button>
      <div id="pMsg" class="msg"></div>
    </div>

    <div class="rule"></div>

    <button id="btnAdd" class="go">Checking List-ə əlavə et</button>
    <div id="msg" class="msg"></div>
    <div style="margin-top:9px">
      <button id="btnClear" class="ghost">Növbəti avtomobil</button>
    </div>
  </div>

  var LANG = 'az';
  function S() { return I18N[LANG] || I18N.az; }

  var PHOTOS = [];   // elandakı bütün şəkil linkləri
  var SEL = [];      // hər şəkil seçilib/seçilməyib
  var READY = [];    // watermark vurulmuş File-lar (paylaşmağa hazır)

  function loadLang() {
    try {
      var v = window.localStorage.getItem('chk_lang');
      if (v && I18N[v]) return v;
    } catch (e) {}
    return 'az';   // seçim edilməyibsə həmişə AZ (brauzerin dili nə olursa olsun)
  }
  function saveLang(v) {
    try { window.localStorage.setItem('chk_lang', v); } catch (e) {}
  }

  function applyLang() {
    var s = S();
    document.documentElement.lang = LANG;
    $('hSub').textContent = s.sub;
    $('url').placeholder = s.urlPh;
    $('btnPaste').innerHTML = '&#128203; ' + s.paste;
    $('btnSearch').textContent = s.search;
    $('btnWipe').title = s.wipeTitle;
    $('btnWipe').setAttribute('aria-label', s.wipeTitle);
    $('hint').textContent = s.hint;
    $('lVin').textContent = s.vin;
    $('lPlate').textContent = s.plate;
    $('lModel').textContent = s.model;
    $('lYear').textContent = s.year;
    $('lPrice').textContent = s.price;
    $('lDealer').textContent = s.dealer;
    $('dealerNone').textContent = s.none;
    $('lCustomer').textContent = s.customer;
    $('lAddress').textContent = s.address;
    $('lSeller').textContent = s.seller;
    $('vNote').textContent = s.vNote;
    $('lLink').textContent = s.link;
    $('btnAdd').textContent = s.add;
    $('btnClear').textContent = s.next;
    $('lPhotos').textContent = s.photos.replace('{n}', PHOTOS.length);
    $('pAll').textContent = s.selAll;
    $('pNone').textContent = s.selNone;
    $('lWm').textContent = s.wm;
    $('btnPhotos').textContent = READY.length
      ? s.saveN.replace('{n}', READY.length)
      : s.prep;
    ['az', 'ru', 'en'].forEach(function (code) {
      var b = $('lg' + code.charAt(0).toUpperCase() + code.slice(1));
      b.className = (code === LANG) ? 'on' : '';
    });
  }

  ['az', 'ru', 'en'].forEach(function (code) {
    $('lg' + code.charAt(0).toUpperCase() + code.slice(1)).onclick = function () {
      LANG = code;
      saveLang(code);
      applyLang();
    };
  });

  LANG = loadLang();
  applyLang();
  /* =============== DİL LÜĞƏTİ SONU =============== */

  function say(el, text, kind) {
    el.textContent = text;
    el.className = 'msg show ' + (kind || 'ok');
  }
  function hide(el) { el.className = 'msg'; }

  // Diler siyahısını yüklə
  google.script.run.withSuccessHandler(function (list) {
    var sel = $('fDealer');
    (list || []).forEach(function (name) {
      var o = document.createElement('option');
      o.value = name; o.textContent = name;
      sel.appendChild(o);
    });
  }).apiGetDealers(API_KEY);

  // Yapışdır — buferdən linki götürüb sahəyə yazır
  $('btnPaste').onclick = function () {
    function manual(note) {
      $('url').focus();
      say($('msgTop'), note, 'warn');
    }
    if (!navigator.clipboard || !navigator.clipboard.readText) {
      manual(S().pasteNo);
      return;
    }
    navigator.clipboard.readText().then(function (text) {
      text = (text || '').trim();
      if (!text) {
        say($('msgTop'), S().pasteEmpty, 'warn');
        return;
      }
      $('url').value = text;
      hide($('msgTop'));
      hide($('msg'));
    }).catch(function () {
      manual(S().pasteFail);
    });
  };

  // Axtar
  $('btnSearch').onclick = function () {
    var url = $('url').value.trim();
    if (!url) { say($('msgTop'), S().noUrl, 'warn'); return; }
    hide($('msgTop'));
    hide($('msg'));
    this.disabled = true;
    this.textContent = '…';
    var btn = this;

    google.script.run
      .withSuccessHandler(function (r) {
        btn.disabled = false; btn.textContent = S().search;
        if (!r || !r.ok) {
          say($('msgTop'), (r && r.error) || S().parseFail, 'err');
          return;
        }
        var d = r.data;
        $('cTitle').textContent = (d.model || S().noModel) + (d.year ? ' \u00B7 ' + d.year : '');
        $('cSource').textContent = r.source;
        $('fVin').value = d.vin || '';
        $('fPlate').value = d.carNumber || '';
        $('fModel').value = d.model || '';
        $('fYear').value = d.year || '';
        $('fPrice').value = d.price || '';
        $('fAddress').value = d.address || '';
        $('fSeller').value = d.seller || '';
        $('cLink').textContent = d.link || '';
        buildPhotos(r.photos || []);
        $('card').style.display = 'block';
        $('card').scrollIntoView({ behavior: 'smooth', block: 'start' });

        var missing = [];
        if (!d.vin) missing.push(S().vinWord);
        if (!d.carNumber) missing.push(S().plateWord);
        if (missing.length) {
          say($('msgTop'), S().missing.replace('{f}', missing.join(S().andWord)), 'warn');
        }
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = S().search;
        say($('msgTop'), S().errPrefix + err.message, 'err');
      })
      .apiParseListing(API_KEY, url);
  };

  // Əlavə et
  $('btnAdd').onclick = function () {
    var btn = this;
    hide($('msg'));
    btn.disabled = true;
    btn.textContent = S().adding;

    var payload = {
      dealer:    $('fDealer').value,
      customer:  $('fCustomer').value.trim(),
      model:     $('fModel').value.trim(),
      vin:       $('fVin').value.trim(),
      carNumber: $('fPlate').value.trim(),
      year:      $('fYear').value.trim(),
      price:     $('fPrice').value.trim(),
      address:   $('fAddress').value.trim(),
      seller:    $('fSeller').value.trim(),
      link:      $('cLink').textContent.trim()
    };

    google.script.run
      .withSuccessHandler(function (r) {
        btn.disabled = false;
        btn.textContent = S().add;
        if (r && r.code === 200) {
          say($('msg'), S().addedRow.replace('{n}', r.row), 'ok');
        } else if (r && r.code === 409) {
          say($('msg'), r.error, 'warn');
        } else {
          say($('msg'), (r && r.error) || S().addFail, 'err');
        }
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = S().add;
        say($('msg'), S().errPrefix + err.message, 'err');
      })
      .apiAddChecking(API_KEY, payload);
  };

  var _logo = null;

  function loadImg(src) {
    return new Promise(function (res, rej) {
      var im = new Image();
      im.onload = function () { res(im); };
      im.onerror = rej;
      im.src = src;
    });
  }

  function buildPhotos(list) {
    PHOTOS = list || [];
    SEL = PHOTOS.map(function () { return true; });
    READY = [];
    var box = $('photos'), grid = $('pGrid');
    grid.innerHTML = '';
    hide($('pMsg'));
    if (!PHOTOS.length) { box.style.display = 'none'; return; }

    PHOTOS.forEach(function (url, i) {
      var cell = document.createElement('div');
      cell.className = 'pcell on';
      // Miniatürü BİRBAŞA mənbədən yükləyirik — göstərmək üçün CORS lazım deyil.
      // referrerpolicy: bəzi CDN-lər yad referer-i bloklaya bilir.
      cell.innerHTML = '<img src="' + url + '" loading="lazy" referrerpolicy="no-referrer" alt="">' +
                       '<span class="pn">' + (i + 1) + '</span>';
      cell.onclick = function () {
        SEL[i] = !SEL[i];
        cell.className = 'pcell ' + (SEL[i] ? 'on' : 'off');
        resetReady();
      };
      grid.appendChild(cell);
    });
    box.style.display = 'block';
    $('lPhotos').textContent = S().photos.replace('{n}', PHOTOS.length);
    $('btnPhotos').textContent = S().prep;
  }

  function markAll(v) {
    SEL = PHOTOS.map(function () { return v; });
    Array.prototype.forEach.call($('pGrid').children, function (c, i) {
      c.className = 'pcell ' + (SEL[i] ? 'on' : 'off');
    });
    resetReady();
  }
  $('pAll').onclick = function () { markAll(true); };
  $('pNone').onclick = function () { markAll(false); };
  $('pWm').onchange = resetReady;

  // Seçim və ya loqo dəyişəndə hazır fayllar etibarsız olur
  function resetReady() {
    if (!READY.length) return;
    READY = [];
    $('btnPhotos').textContent = S().prep;
    hide($('pMsg'));
  }

  function fetchPhoto(url) {
    return new Promise(function (res, rej) {
      google.script.run
        .withSuccessHandler(function (r) {
          if (r && r.ok) res(r.dataUrl);
          else rej(new Error((r && r.error) || 'fetch failed'));
        })
        .withFailureHandler(rej)
        .apiFetchPhoto(API_KEY, url);
    });
  }

  /* Watermark — Tampermonkey watermarkBuffer() ilə eyni:
     loqo enin 38%-i, 0.35 şəffaflıq, 5 mövqe, yalnız tam sığanda çəkilir */
  function watermark(img, logo) {
    var c = document.createElement('canvas');
    c.width = img.naturalWidth || img.width;
    c.height = img.naturalHeight || img.height;
    var ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0);

    if (logo && logo.naturalWidth) {
      var lw = Math.round(c.width * 0.38);
      var lh = Math.round(lw * (logo.naturalHeight / logo.naturalWidth));
      var mx = Math.round(c.width * 0.04);
      var my = Math.round(c.height * 0.05);
      var cx = Math.round((c.width - lw) / 2);
      var cy = Math.round((c.height - lh) / 2);
      var rx = c.width - lw - mx;
      var by = c.height - lh - my;
      ctx.globalAlpha = 0.35;
      [[mx, my], [rx, my], [mx, by], [rx, by], [cx, cy]].forEach(function (p) {
        if (p[0] >= 0 && p[1] >= 0 && p[0] + lw <= c.width && p[1] + lh <= c.height) {
          ctx.drawImage(logo, p[0], p[1], lw, lh);
        }
      });
      ctx.globalAlpha = 1;
    }
    return new Promise(function (res) { c.toBlob(res, 'image/jpeg', 0.92); });
  }

  /* iOS navigator.share() yalnız toxunuşun "isti" anında işləyir.
     Ona görə axın 2 toxunuşdur: əvvəl hazırla (uzun sürür), sonra saxla (dərhal). */
  $('btnPhotos').onclick = function () {
    if (READY.length) { doShare(); return; }
    prepare();
  };

  function prepare() {
    var urls = PHOTOS.filter(function (_, i) { return SEL[i]; });
    if (!urls.length) { say($('pMsg'), S().noSel, 'warn'); return; }

    var btn = $('btnPhotos');
    btn.disabled = true;
    var files = [], fails = 0;

    var logoP = $('pWm').checked
      ? (_logo ? Promise.resolve(_logo) : loadImg(WM_LOGO).then(function (l) { _logo = l; return l; }))
      : Promise.resolve(null);

    logoP.catch(function () { return null; }).then(function (logo) {
      var chain = Promise.resolve();
      urls.forEach(function (url, i) {
        chain = chain.then(function () {
          say($('pMsg'), S().preparing.replace('{i}', i + 1).replace('{n}', urls.length), 'warn');
          return fetchPhoto(url)
            .then(loadImg)
            .then(function (im) { return watermark(im, logo); })
            .then(function (blob) {
              if (!blob) throw new Error('blob boşdur');
              files.push(new File([blob], 'carify_' + ('0' + (i + 1)).slice(-2) + '.jpg',
                                  { type: 'image/jpeg' }));
            })
            .catch(function (e) { fails++; console.log('şəkil ' + (i + 1) + ': ' + e.message); });
        });
      });
      return chain;
    }).then(function () {
      btn.disabled = false;
      if (!files.length) { say($('pMsg'), S().allFail, 'err'); return; }
      READY = files;
      btn.textContent = S().saveN.replace('{n}', files.length);
      say($('pMsg'), fails ? S().failN.replace('{n}', fails) : S().readyN.replace('{n}', files.length),
          fails ? 'warn' : 'ok');
    });
  }

  function doShare() {
    var files = READY;
    if (navigator.canShare && navigator.canShare({ files: files })) {
      navigator.share({ files: files })
        .then(function () { say($('pMsg'), S().shareOpen, 'ok'); })
        .catch(function (e) {
          if (e && e.name === 'AbortError') return;   // istifadəçi ləğv etdi
          showBlobs(); say($('pMsg'), S().longPress, 'warn');
        });
    } else {
      showBlobs();
      say($('pMsg'), S().shareNo, 'warn');
    }
  }

  // Ehtiyat yol: paylaşma alınmasa, miniatürləri watermark vurulmuş
  // versiyalarla əvəz edirik — uzun basıb "Save Image" etmək olur
  function showBlobs() {
    var cells = $('pGrid').children, k = 0;
    for (var i = 0; i < PHOTOS.length && k < READY.length; i++) {
      if (!SEL[i]) continue;
      var img = cells[i].querySelector('img');
      if (img) img.src = URL.createObjectURL(READY[k]);
      k++;
    }
  }

  // Hamısını təmizlə — həm yuxarıdakı ✕, həm də "Növbəti avtomobil" bunu çağırır
  function clearAll() {
    ['url', 'fVin', 'fPlate', 'fModel', 'fYear', 'fPrice', 'fCustomer', 'fAddress', 'fSeller']
      .forEach(function (id) { $(id).value = ''; });
    $('fDealer').selectedIndex = 0;
    $('cLink').textContent = '';
    buildPhotos([]);
    $('cTitle').textContent = '\u2014';
    $('cSource').textContent = '\u2014';
    $('card').style.display = 'none';
    hide($('msg'));
    hide($('msgTop'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
    $('url').focus();
  }

  // Növbəti avtomobil (kartın altında)
  $('btnClear').onclick = clearAll;

  // ✕ — axtar düyməsinin yanında
  $('btnWipe').onclick = clearAll;
</script>
