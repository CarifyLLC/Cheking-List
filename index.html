<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Carify — Checking</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- İkon — kalkulyator faylındakı ilə eyni məntiq.
       Bu səhifə üst sənəddir, ona görə iOS bu etiketi OXUYUR. -->
  <link rel="apple-touch-icon" href="https://i.imgur.com/ENcRLd6.png">
  <link rel="apple-touch-icon-precomposed" href="https://i.imgur.com/ENcRLd6.png">
  <link rel="icon" href="https://i.imgur.com/ENcRLd6.png" sizes="any">

  <!-- Ana ekrandan açanda tam ekran, Safari paneli olmadan -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Checking">
  <meta name="theme-color" content="#8E1114">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #8E1114;
      overscroll-behavior: none;
    }
    #app {
      display: block;
      border: 0;
      width: 100%;
      height: 100%;
      background: #f6f5f3;
    }
    #hint {
      display: none;
      padding: 24px 20px;
      color: #fff;
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #hint code {
      display: block;
      margin-top: 10px;
      padding: 10px;
      background: rgba(0,0,0,.25);
      border-radius: 8px;
      font-size: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>

<iframe id="app" allow="clipboard-read; clipboard-write" title="Carify Checking List"></iframe>
<div id="hint">
  Link yarımçıqdır — açar yoxdur. Ana ekrandakı qısayolu bu formada saxla:
  <code>.../checking/#key=carify-wa-lookup-x7k9msajhdbye3xgdgrttdhs77466354</code>
</div>

<script>
  /* ============================================================
     ADDIM 1: aşağıdakı EXEC_URL-i öz deployment linkinlə əvəz et.
     Sonundakı /exec-ə qədər yaz, parametr yazma — onu skript özü qoşur.
     ============================================================ */
  var EXEC_URL = 'https://script.google.com/macros/s/AKfycbzRcJvOHKR9BA48ItNyFSpVgwEHxhJCAigISws62ddUNphtt3DuLEX8X137HUbKTx9m8A/exec';

  /* key linkin # hissəsindən oxunur — repo public olsa da sirr içəridə deyil.
     Ana ekran linki:  https://<istifadeci>.github.io/<repo>/checking/#key=SECRET  */
  var key = '';
  var h = location.hash.replace(/^#/, '');
  h.split('&').forEach(function (part) {
    var kv = part.split('=');
    if (kv[0] === 'key') key = decodeURIComponent(kv[1] || '');
  });

  if (key) {
    document.getElementById('app').src =
      EXEC_URL + '?page=checking&key=' + encodeURIComponent(key);
  } else {
    document.getElementById('app').style.display = 'none';
    document.getElementById('hint').style.display = 'block';
  }
</script>

</body>
</html>
